---
- name: Aplicar prefix-lists nos routers
  hosts: all
  gather_facts: false

  tasks:
    - name: Verificar que a config renderizada existe
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../rendered/{{ inventory_hostname }}.conf"
      register: cfg_file
      delegate_to: localhost

    - name: Falhar se config não foi encontrada
      ansible.builtin.fail:
        msg: "Config {{ playbook_dir }}/../rendered/{{ inventory_hostname }}.conf não existe! Precisa rodar render_configs antes."
      when: not cfg_file.stat.exists

    - name: Aplicar config
      cisco.ios.ios_config:
        src: "{{ playbook_dir }}/../rendered/{{ inventory_hostname }}.conf"
        backup: false

    - name: Get Prefix-lists para {{ inventory_hostname }}
      cisco.ios.ios_command:
        commands: show ip prefix-list
      register: show_output

    - name: Mostrar output do show ip prefix-list
      ansible.builtin.debug:
        var: show_output.stdout_lines