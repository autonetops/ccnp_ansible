---
- name: Renderizar prefix-lists para todos os routers
  hosts: routers
  gather_facts: false

  tasks:
    - name: Criar diretório de saída
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../rendered"
        state: directory
        mode: '0755'
      run_once: true
      delegate_to: localhost

    - name: Renderizar prefix-list de {{ inventory_hostname }}
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/prefix-list.j2"
        dest: "{{ playbook_dir }}/../rendered/{{ inventory_hostname }}.conf"
        mode: '0644'
      delegate_to: localhost

    - name: Confirmar geração
      ansible.builtin.debug:
        msg: "Renderizado: rendered/{{ inventory_hostname }}.conf"